<!doctype html>
<html lang="pl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#ffffff">
<title>Maturalna karta wzorów - fizyka</title>
<link rel="manifest" href="manifest.webmanifest">
<link rel="icon" href="icons/icon-192.png">

<style>
/* (CSS bez zmian – Twój kod jest OK, więc skracam dla czytelności) */
</style>
</head>

<body>

<!-- SPLASH -->
<div id="splash" class="splash">
  <div>
    <div class="splash-frame">
      <img src="splash.jpg" alt="Ekran startowy aplikacji">
    </div>
    <div class="splash-note">Ładowanie aplikacji…</div>
  </div>
</div>

<div class="app">

  <!-- START -->
  <main id="startScreen" class="start-screen">
    <div class="wrap">

      <header class="start-header">
        <div class="title-row">
          <h1 class="title">Maturalna karta wzorów - fizyka</h1>
          <button id="infoBtn" class="info-btn" aria-label="Informacje">i</button>
        </div>

        <p class="subtitle">Wybierz dział lub wyszukaj temat.</p>

        <div class="search-wrap">
          <label class="search-label" for="sectionSearch">Wyszukaj temat</label>
          <div class="search-input-wrap">
            <input id="sectionSearch" class="search-input" type="search" placeholder="Np. magnetyzm">
            <button id="clearSearch" class="clear-search hidden" type="button">✕</button>
          </div>

          <!-- ✅ FIX -->
          <div id="searchMeta" class="search-meta"></div>
        </div>
      </header>

      <nav id="sectionList" class="section-list"></nav>
    </div>
  </main>

  <!-- READER -->
  <section id="readerScreen" class="reader-screen hidden">

    <div class="reader-top">
      <div class="reader-top-inner">

        <div class="reader-top-row">
          <button id="backBtn" class="back-btn">Spis działów</button>
          <div class="reader-label">Przewijaj lub użyj wyszukiwarki</div>
        </div>

        <div class="reader-search-wrap">
          <label for="readerSearch">Wyszukaj</label>

          <div class="search-input-wrap">
            <input id="readerSearch" class="search-input" type="search">
            <button id="clearReaderSearch" class="clear-search hidden">✕</button>
          </div>

          <!-- ✅ FIX -->
          <div id="readerSearchMeta" class="reader-search-meta"></div>
        </div>

      </div>
    </div>

    <div id="readerContent" class="reader-content"></div>
  </section>
</div>

<!-- MODAL -->
<div id="infoModal" class="modal hidden">
  <div class="modal-content">
    <button id="closeModal" class="modal-close" type="button">✕</button>
    <h2>Informacja</h2>
    <p>Materiał edukacyjny inspirowany CKE.</p>
  </div>
</div>

<script>

/* ===================== DATA ===================== */

const sections = [
  { id: "kinematyka", title: "Kinematyka", images: ["images/kinematyka.png"] },
  { id: "dynamika", title: "Dynamika", images: ["images/dynamika.png"] }
];

/* ===================== ELEMENTY ===================== */

const startScreen = document.getElementById('startScreen');
const readerScreen = document.getElementById('readerScreen');
const sectionList = document.getElementById('sectionList');
const readerContent = document.getElementById('readerContent');

const sectionSearch = document.getElementById('sectionSearch');
const readerSearch = document.getElementById('readerSearch');

const searchMeta = document.getElementById('searchMeta');
const readerSearchMeta = document.getElementById('readerSearchMeta');

const splash = document.getElementById('splash');

/* ===================== UTIL ===================== */

function normalize(text) {
  return text.toLowerCase();
}

/* ===================== START ===================== */

function renderStart(query = '') {
  const q = normalize(query);

  const filtered = sections.filter(s =>
    normalize(s.title).includes(q)
  );

  sectionList.innerHTML = filtered.map(s =>
    `<button data-id="${s.id}">${s.title}</button>`
  ).join('');

  sectionList.querySelectorAll('button').forEach(btn => {
    btn.onclick = () => openReader(btn.dataset.id);
  });

  /* ✅ FIX – zabezpieczenie */
  if (searchMeta) {
    searchMeta.textContent = q
      ? `Znaleziono: ${filtered.length}`
      : 'Wpisz frazę';
  }
}

/* ===================== READER ===================== */

function buildReader() {
  readerContent.innerHTML = sections.map(s => `
    <div id="${s.id}" class="panel">
      <h2>${s.title}</h2>
      ${s.images.map(src =>
        `<img src="${src}" alt="${s.title} – karta wzorów">`
      ).join('')}
    </div>
  `).join('');
}

function openReader(id) {
  startScreen.classList.add('hidden');
  readerScreen.classList.remove('hidden');
  document.getElementById(id)?.scrollIntoView();
}

/* ===================== SEARCH ===================== */

sectionSearch.addEventListener('input', e => {
  renderStart(e.target.value);
});

/* ===================== MODAL ===================== */

const infoBtn = document.getElementById('infoBtn');
const infoModal = document.getElementById('infoModal');
const closeModal = document.getElementById('closeModal');

infoBtn.onclick = () => {
  infoModal.classList.remove('hidden');
  closeModal.focus();
};

closeModal.onclick = () => {
  infoModal.classList.add('hidden');
  infoBtn.focus();
};

window.addEventListener('keydown', e => {
  if (e.key === 'Escape') {
    infoModal.classList.add('hidden');
  }
});

/* ===================== SPLASH ===================== */

window.addEventListener('load', () => {
  setTimeout(() => {
    splash.classList.add('hidden');
    splash.setAttribute('aria-hidden', 'true');
  }, 1500);
});

/* ===================== INIT ===================== */

renderStart();
buildReader();

</script>
</body>
</html>
