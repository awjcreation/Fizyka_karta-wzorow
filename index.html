<!doctype html>
<html lang="pl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#ffffff">
<title>Karta wzorów fizyka</title>
<link rel="manifest" href="manifest.webmanifest">
<link rel="icon" href="icons/icon-192.png">
<style>
:root {
  --bg:#ffffff;
  --surface:#ffffff;
  --surface-2:#f6f4fb;
  --text:#17121f;
  --muted:#6f6881;
  --line:#e7e1f1;
  --accent:#7c3aed;
  --accent-2:#a855f7;
  --shadow:0 12px 28px rgba(23,18,31,.08);
  --radius:18px;
}
* { box-sizing:border-box; }
html { scroll-behavior:auto; }
body {
  margin:0;
  font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
  color:var(--text);
  background:linear-gradient(180deg,#fcfbff 0%,#f7f4fb 100%);
}
button, a { -webkit-tap-highlight-color: transparent; }
img { display:block; max-width:100%; height:auto; }
.hidden { display:none !important; }
.app { min-height:100dvh; }
.start-screen, .reader-screen { min-height:100dvh; }
.wrap { width:min(100%, 820px); margin:0 auto; padding:20px 16px calc(26px + env(safe-area-inset-bottom)); }
.start-header { padding:6px 0 10px; }
.title { margin:0; font-size:clamp(1.7rem,4.5vw,2.35rem); line-height:1.05; letter-spacing:-.03em; }
.subtitle { margin:10px 0 0; color:var(--muted); font-size:.98rem; line-height:1.5; }
.section-list { display:grid; gap:12px; margin-top:18px; }
.section-link {
  width:100%; border:1px solid var(--line); background:var(--surface); color:var(--text); text-align:left;
  border-radius:16px; padding:16px 18px; font-size:1rem; font-weight:650; box-shadow:var(--shadow); cursor:pointer;
}
.section-link:active { transform:translateY(1px); }
.license { margin:18px; color:var(--muted); font-size:.88rem; line-height:1.45; text-align: center}
.reader-top {
  position:sticky; top:0; z-index:10; backdrop-filter: blur(10px); background:rgba(255,255,255,.9);
  border-bottom:1px solid var(--line);
}
.reader-top-inner { width:min(100%, 820px); margin:0 auto; padding:calc(10px + env(safe-area-inset-top)); display:flex; align-items:center; gap:12px; }
.back-btn {
  border:1px solid var(--line); background:var(--surface); color:var(--text); border-radius:999px; padding:10px 14px;
  font-weight:700; box-shadow:var(--shadow); cursor:pointer;
}
.reader-label { font-size:.92rem; color:var(--muted); }
.reader-content { width:min(100%, 900px); margin:0 auto; padding:18px 12px 32px; }
.panel {
  background:var(--surface); border:1px solid var(--line); border-radius:22px; padding:14px; box-shadow:var(--shadow); margin-bottom:16px;
  scroll-margin-top:90px;
}
.panel h2 { margin:2px 2px 12px; font-size:1.08rem; line-height:1.25; letter-spacing:-.02em; }
.figure {
  background:#fff; border:1px solid #eee8f8; border-radius:16px; padding:10px; overflow:hidden; margin-top:10px;
}
.figure img { width:100%; height:auto; object-fit:contain; border-radius:10px; }
.splash {
  position:fixed; inset:0; z-index:1000; display:grid; place-items:center; background:radial-gradient(circle at top,#f5edff 0%, #ffffff 46%, #f6f4fb 100%);
  opacity:1; visibility:visible; transition:opacity .7s ease, visibility .7s ease;
}
.splash.hidden { opacity:0; visibility:hidden; pointer-events:none; }
.splash-frame {
  width:min(86vw,420px); aspect-ratio:3/5; background:#fff; border:1px solid var(--line); border-radius:28px; padding:14px;
  box-shadow:0 22px 60px rgba(83,49,141,.16); display:flex; align-items:center; justify-content:center;
}
.splash-frame img { width:100%; height:100%; object-fit:contain; border-radius:18px; background:#fff; }
.splash-note { margin-top:14px; text-align:center; color:var(--muted); font-size:.94rem; }
@media (min-width: 760px) {
  .wrap { padding-left:22px; padding-right:22px; }
  .reader-content { padding-left:18px; padding-right:18px; }
  .panel { padding:18px; }
}
</style>
</head>
<body>
<div id="splash" class="splash" aria-hidden="true">
  <div>
    <div class="splash-frame"><img src="splash.jpg" alt="Ekran startowy aplikacji"></div>
    <div class="splash-note">Ładowanie aplikacji…</div>
  </div>
</div>
<div class="app">
  <main id="startScreen" class="start-screen">
    <div class="wrap">
      <header class="start-header">
        <h1 class="title">Karta wzorów fizyka</h1>
        <p class="subtitle">Wybierz dział, od którego chcesz zacząć.</p>
      </header>
      <nav id="sectionList" class="section-list" aria-label="Lista działów"></nav>
      <p class="license">Opracowanie edukacyjne na podstawie materiałów egzaminacyjnych CKE. <br>Aplikacja nie jest oficjalnym materiałem CKE.</p>
    </div>
  </main>
  <section id="readerScreen" class="reader-screen hidden" aria-label="Czytnik działów">
    <div class="reader-top">
      <div class="reader-top-inner">
        <button id="backBtn" class="back-btn" type="button">Wróć</button>
        <div class="reader-label">Przewijaj, aby przejść przez wszystkie działy</div>
      </div>
    </div>
    <div id="readerContent" class="reader-content"></div>
  </section>
</div>
<script>
const sections = [{"id": "drgania_fale_mechaniczne_i_swietlne", "title": "Drgania, fale mechaniczne i świetlne", "images": ["images/drgania_fale_mechaniczne_i_swietlne.png", "images/drgania_fale_mechaniczne_i_swietlne_cd.png"]}, {"id": "hydrostatyka_aerostatyka", "title": "Hydrostatyka i aerostatyka", "images": ["images/hydrostatyka_aerostatyka.png"]}, {"id": "termodynamika", "title": "Termodynamika", "images": ["images/termodynamika.png"]}, {"id": "elektrostatyka", "title": "Elektrostatyka", "images": ["images/elektrostatyka.png"]}, {"id": "prad_elektryczny", "title": "Prąd elektryczny", "images": ["images/prad_elektryczny.png"]}, {"id": "magnetyzm", "title": "Magnetyzm", "images": ["images/magnetyzm.png"]}, {"id": "optyka_geometryczna", "title": "Optyka geometryczna", "images": ["images/optyka_geometryczna.png"]}, {"id": "elementy_mechaniki_relatywistycznej", "title": "Elementy mechaniki relatywistycznej", "images": ["images/elementy_mechaniki_relatywistycznej.png"]}, {"id": "elementy_fizyki_atomowej_i_jadrowej", "title": "Elementy fizyki atomowej i jądrowej", "images": ["images/elementy_fizyki_atomowej_i_jadrowej.png"]}, {"id": "wybrane_zaleznosci", "title": "Wybrane zależności", "images": ["images/wybrane_zaleznosci.png"]}, {"id": "podstawowe_jednostki_ukladu_si", "title": "Podstawowe jednostki układu SI", "images": ["images/podstawowe_jednostki_ukladu_si.png"]}, {"id": "przedrostki_jednostek_miar", "title": "Przedrostki jednostek miar", "images": ["images/przedrostki_jednostek_miar.png"]}, {"id": "wartosci_wybranych_stalych_fizycznych", "title": "Wartości wybranych stałych fizycznych", "images": ["images/wartosci_wybranych_stalych_fizycznych.jpg"]}, {"id": "wybrane_stale_i_parametry_astrofizyczne", "title": "Wybrane stałe i parametry astrofizyczne", "images": ["images/wybrane_stale_i_parametry_astrofizyczne.png"]}, {"id": "wartosci_wybranych_jednostek_spoza_ukladu_si", "title": "Wartości wybranych jednostek spoza układu SI", "images": ["images/wartosci_wybranych_jednostek_spoza_ukladu_si.png"]}];
const startScreen = document.getElementById('startScreen');
const readerScreen = document.getElementById('readerScreen');
const sectionList = document.getElementById('sectionList');
const readerContent = document.getElementById('readerContent');
const backBtn = document.getElementById('backBtn');
const splash = document.getElementById('splash');
let lastTargetId = sections[0]?.id || '';

function buildStart() {
  sectionList.innerHTML = sections.map(section => `
    <button class="section-link" type="button" data-target="${section.id}">${section.title}</button>
  `).join('');
  sectionList.querySelectorAll('[data-target]').forEach(btn => {
    btn.addEventListener('click', () => openReader(btn.dataset.target));
  });
}

function buildReader() {
  readerContent.innerHTML = sections.map(section => `
    <article class="panel" id="${section.id}" tabindex="-1">
      <h2>${section.title}</h2>
      ${section.images.map(src => `<div class="figure"><img loading="lazy" src="${src}" alt="${section.title}"></div>`).join('')}
    </article>
  `).join('') + `<p class="license">Opracowanie edukacyjne na podstawie materiałów egzaminacyjnych CKE. Aplikacja nie jest oficjalnym materiałem CKE.</p>`;
}

function openReader(targetId) {
  lastTargetId = targetId || sections[0]?.id || '';
  startScreen.classList.add('hidden');
  readerScreen.classList.remove('hidden');

  requestAnimationFrame(() => {
    const target = document.getElementById(lastTargetId);

    if (target) {
      target.scrollIntoView({ behavior: 'auto', block: 'start' });
      target.focus({ preventScroll: true });
    } else {
      window.scrollTo({ top: 0, behavior: 'auto' });
    }
  });
}

function closeReader() {
  readerScreen.classList.add('hidden');
  startScreen.classList.remove('hidden');
  window.scrollTo({ top: 0, behavior: 'instant' in window ? 'instant' : 'auto' });
}

backBtn.addEventListener('click', closeReader);
window.addEventListener('keydown', event => {
  if (event.key === 'Escape' && !readerScreen.classList.contains('hidden')) closeReader();
});

buildStart();
buildReader();

window.addEventListener('load', () => {
  setTimeout(() => splash.classList.add('hidden'), 2300);
});

if ('serviceWorker' in navigator && (location.protocol === 'https:' || location.hostname === 'localhost')) {
  window.addEventListener('load', () => navigator.serviceWorker.register('./sw.js').catch(() => {}));
}
</script>
</body>
</html>
